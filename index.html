<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F1E8">
<meta name="apple-mobile-web-app-title" content="Programma">
<title>Programma · 18 mag – 10 giu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">

<style>
/* =========================================================
   THEME: Italian editorial — crema, nero profondo, oro caldo
   ========================================================= */
:root {
  /* Light (default) */
  --bg: #F5F1E8;            /* crema pallida */
  --bg-card: #FFFFFF;
  --bg-elev: #FAF6ED;       /* card alternative */
  --ink: #1A1611;           /* nero caffe */
  --ink-soft: #524A3D;
  --ink-faded: #8A7F6B;
  --gold: #B8884A;          /* oro caldo */
  --gold-soft: #D4B58A;
  --line: #E8DFCC;          /* linea sottile */
  --line-strong: #C9BFA8;
  --check-fill: #1A1611;
  --check-bg: transparent;
  --shadow-sm: 0 1px 2px rgba(26,22,17,0.04);
  --shadow-md: 0 4px 16px rgba(26,22,17,0.08);
  --shadow-lg: 0 12px 40px rgba(26,22,17,0.12);
  --radius: 14px;
  --radius-sm: 8px;
  --header-h: env(safe-area-inset-top, 0);
  --tabbar-h: 70px;
  --content-pad: calc(env(safe-area-inset-bottom, 0) + var(--tabbar-h) + 12px);

  /* Type */
  --font-display: 'Fraunces', 'Times New Roman', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

[data-theme="dark"] {
  --bg: #14110D;
  --bg-card: #1F1B16;
  --bg-elev: #25201A;
  --ink: #F0EBE0;
  --ink-soft: #C9BFA8;
  --ink-faded: #8A7F6B;
  --gold: #D4A876;
  --gold-soft: #B8884A;
  --line: #2F2A22;
  --line-strong: #3E382D;
  --check-fill: #F0EBE0;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior: none;
}

body {
  min-height: 100vh;
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: 0;
  padding-left: env(safe-area-inset-left, 0);
  padding-right: env(safe-area-inset-right, 0);
}

/* =========================================================
   HEADER
   ========================================================= */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  background: rgba(245,241,232,0.92);
}
[data-theme="dark"] .app-header {
  background: rgba(20,17,13,0.92);
}

.app-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.1;
  font-style: italic;
}

.app-subtitle {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-faded);
  margin-top: 2px;
}

.theme-toggle {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s ease;
  flex-shrink: 0;
  color: var(--ink);
}
.theme-toggle:active { transform: scale(0.92); }
.theme-toggle svg { width: 20px; height: 20px; }

/* =========================================================
   MAIN VIEW CONTAINER
   ========================================================= */
.view {
  display: none;
  padding: 0 20px var(--content-pad);
  animation: fadeIn 0.25s ease;
}
.view.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: none; }
}

/* =========================================================
   PROGRESS BAR (top of "Oggi")
   ========================================================= */
.progress-section {
  padding: 18px 0 8px;
}
.progress-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-faded);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.progress-percent {
  font-family: var(--font-display);
  font-size: 16px;
  font-style: italic;
  color: var(--ink);
  letter-spacing: -0.01em;
  text-transform: none;
}
.progress-bar {
  height: 6px;
  background: var(--line);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* =========================================================
   DAY HEADER (large editorial title)
   ========================================================= */
.day-header {
  padding: 18px 0 22px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 24px;
}

.day-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.nav-arrow {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--ink);
  transition: transform 0.15s ease, background 0.2s ease;
  -webkit-user-select: none;
  user-select: none;
}
.nav-arrow:active { transform: scale(0.9); background: var(--bg-elev); }
.nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

.day-pill {
  text-align: center;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink-faded);
  font-weight: 600;
}

.day-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 32px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin: 0 0 6px;
}
.day-title em {
  font-style: italic;
  font-weight: 400;
}

.day-subtitle {
  font-family: var(--font-body);
  font-size: 13px;
  font-style: normal;
  color: var(--ink-soft);
  line-height: 1.4;
  margin-top: 6px;
}

.day-type-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 12px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  color: var(--ink-soft);
}
.day-type-badge.type-sport { color: #8B3A3A; border-color: rgba(139,58,58,0.3); }
.day-type-badge.type-running { color: var(--gold); border-color: rgba(184,136,74,0.4); }
.day-type-badge.type-rest { color: #4A7C59; border-color: rgba(74,124,89,0.3); }
.day-type-badge.type-home { color: #2E5984; border-color: rgba(46,89,132,0.3); }
.day-type-badge.type-office { color: var(--ink-soft); }

[data-theme="dark"] .day-type-badge.type-sport { color: #E08585; }
[data-theme="dark"] .day-type-badge.type-running { color: var(--gold); }
[data-theme="dark"] .day-type-badge.type-rest { color: #8DC79E; }
[data-theme="dark"] .day-type-badge.type-home { color: #7BAACC; }

/* =========================================================
   SECTION CARDS
   ========================================================= */
.section {
  margin-bottom: 28px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--gold);
  margin: 0 0 14px;
  padding-left: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}

.card-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 8px;
}

/* =========================================================
   CHECKABLE ITEM
   ========================================================= */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 4px;
  cursor: pointer;
  min-height: 44px;
  -webkit-user-select: none;
  user-select: none;
  transition: opacity 0.2s ease;
  position: relative;
}
.check-item + .check-item {
  border-top: 1px solid var(--line);
}

.checkbox {
  width: 22px;
  height: 22px;
  border: 1.5px solid var(--line-strong);
  border-radius: 5px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  margin-top: 1px;
}

.check-item.checked .checkbox {
  background: var(--ink);
  border-color: var(--ink);
}
[data-theme="dark"] .check-item.checked .checkbox {
  background: var(--gold);
  border-color: var(--gold);
}

.checkbox svg {
  width: 14px;
  height: 14px;
  opacity: 0;
  color: var(--bg);
  transition: opacity 0.2s ease;
}
.check-item.checked .checkbox svg { opacity: 1; }

.check-text {
  flex: 1;
  font-size: 14.5px;
  line-height: 1.45;
  color: var(--ink);
  transition: all 0.2s ease;
}

.check-item.checked .check-text {
  color: var(--ink-faded);
  text-decoration: line-through;
  text-decoration-color: var(--ink-faded);
  text-decoration-thickness: 1px;
}

.check-time {
  font-family: var(--font-display);
  font-weight: 500;
  font-style: italic;
  color: var(--gold);
  margin-right: 8px;
  font-size: 13px;
  white-space: nowrap;
}

/* Recipe link inline */
.recipe-link {
  color: var(--gold);
  text-decoration: underline;
  text-decoration-color: var(--gold-soft);
  text-underline-offset: 3px;
  cursor: pointer;
  font-weight: 500;
}
.recipe-link:active { opacity: 0.6; }

/* =========================================================
   WORKOUT CARD (special)
   ========================================================= */
.workout-card {
  background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-elev) 100%);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 18px 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-md);
}
.workout-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0 0 4px;
}
.workout-meta {
  font-size: 12px;
  color: var(--ink-faded);
  font-style: italic;
  margin-bottom: 14px;
  line-height: 1.5;
}
.workout-section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 600;
  color: var(--gold);
  margin: 14px 0 6px;
}
.workout-warmup, .workout-cooldown {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.5;
  padding: 8px 12px;
  background: var(--bg-elev);
  border-radius: var(--radius-sm);
  border-left: 2px solid var(--gold-soft);
}

.exercise-list {
  margin: 0;
  padding: 0;
  list-style: none;
}
.exercise-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  min-height: 48px;
}
.exercise-item:last-child { border-bottom: none; }
.exercise-checkbox {
  width: 22px;
  height: 22px;
  border: 1.5px solid var(--line-strong);
  border-radius: 5px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
.exercise-item.done .exercise-checkbox {
  background: var(--ink);
  border-color: var(--ink);
}
[data-theme="dark"] .exercise-item.done .exercise-checkbox {
  background: var(--gold);
  border-color: var(--gold);
}
.exercise-item.done .exercise-checkbox svg { opacity: 1; }
.exercise-checkbox svg { width: 14px; height: 14px; opacity: 0; color: var(--bg); }

.exercise-name {
  flex: 1;
  font-size: 14.5px;
  color: var(--ink);
  font-weight: 500;
}
.exercise-reps {
  font-family: var(--font-display);
  font-size: 13px;
  font-style: italic;
  color: var(--gold);
  white-space: nowrap;
}
.exercise-note {
  font-size: 12px;
  color: var(--ink-faded);
  font-style: italic;
  margin-top: 2px;
}
.exercise-item.done .exercise-name {
  color: var(--ink-faded);
  text-decoration: line-through;
}

.timer-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  margin-top: 14px;
  padding: 14px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  min-height: 48px;
  transition: transform 0.15s ease;
  text-transform: uppercase;
}
[data-theme="dark"] .timer-btn {
  background: var(--gold);
  color: var(--ink);
}
.timer-btn:active { transform: scale(0.98); }
.timer-btn svg { width: 16px; height: 16px; }

/* =========================================================
   TAB BAR (bottom navigation)
   ========================================================= */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  background: var(--bg-card);
  border-top: 1px solid var(--line);
  padding: 6px 6px env(safe-area-inset-bottom, 6px);
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.92);
}
[data-theme="dark"] .tab-bar {
  background: rgba(31,27,22,0.94);
}

.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 8px 4px;
  background: none;
  border: none;
  color: var(--ink-faded);
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  min-height: 50px;
  transition: color 0.2s ease;
}
.tab-btn svg {
  width: 22px;
  height: 22px;
  stroke-width: 1.5;
}
.tab-btn.active {
  color: var(--ink);
}
[data-theme="dark"] .tab-btn.active {
  color: var(--gold);
}

/* =========================================================
   CALENDARIO VIEW
   ========================================================= */
.calendar-header {
  padding: 24px 0 18px;
  text-align: center;
}
.calendar-title {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin: 0 0 4px;
}
.calendar-subtitle {
  font-size: 12px;
  color: var(--ink-faded);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 18px;
}

.calendar-day-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  text-align: center;
  color: var(--ink-faded);
  padding: 6px 0;
}

.calendar-cell {
  aspect-ratio: 1 / 1.1;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: all 0.2s ease;
  min-height: 44px;
}
.calendar-cell:active { transform: scale(0.94); }

.calendar-cell.empty {
  background: transparent;
  border: none;
  cursor: default;
}

.calendar-cell-num {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1;
}
.calendar-cell-day {
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-faded);
  margin-top: 3px;
  font-weight: 600;
}

.calendar-cell.completed {
  background: var(--ink);
  border-color: var(--ink);
}
[data-theme="dark"] .calendar-cell.completed {
  background: var(--gold);
  border-color: var(--gold);
}
.calendar-cell.completed .calendar-cell-num,
.calendar-cell.completed .calendar-cell-day {
  color: var(--bg);
}

.calendar-cell.partial::after {
  content: '';
  position: absolute;
  bottom: 4px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
}

.calendar-cell.today {
  outline: 2px solid var(--gold);
  outline-offset: -1px;
}

.calendar-cell.future {
  opacity: 0.45;
}

.calendar-legend {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 16px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--ink-faded);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
}
.legend-square {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  border: 1px solid var(--line);
}
.legend-square.completed { background: var(--ink); border-color: var(--ink); }
.legend-square.today { outline: 2px solid var(--gold); }
.legend-square.partial { position: relative; }
.legend-square.partial::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--gold);
}
[data-theme="dark"] .legend-square.completed { background: var(--gold); border-color: var(--gold); }

/* =========================================================
   STATISTICHE VIEW
   ========================================================= */
.stats-header {
  padding: 24px 0 18px;
  text-align: center;
}
.stats-title {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 26px;
  font-weight: 500;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.stat-card-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-faded);
  font-weight: 600;
  margin-bottom: 6px;
}
.stat-card-value {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 500;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--ink);
}
.stat-card-value em {
  font-style: italic;
  font-weight: 400;
}
.stat-card-sub {
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 6px;
}

.stats-bars {
  margin-top: 18px;
}
.week-stat {
  margin-bottom: 14px;
}
.week-stat-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 13px;
  margin-bottom: 6px;
}
.week-stat-name {
  font-weight: 500;
}
.week-stat-pct {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--gold);
}
.week-stat-bar {
  height: 6px;
  background: var(--line);
  border-radius: 3px;
  overflow: hidden;
}
.week-stat-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* =========================================================
   RICETTE VIEW
   ========================================================= */
.ricette-header {
  padding: 24px 0 18px;
}
.ricette-title {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 26px;
  font-weight: 500;
  text-align: center;
  margin: 0 0 4px;
}
.ricette-subtitle {

// ---------- DATE UTILITIES ----------
const MONTHS_IT = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
const DAYS_IT = ['Domenica','Lunedi','Martedi','Mercoledi','Giovedi','Venerdi','Sabato'];
const DAYS_SHORT = ['D','L','M','M','G','V','S'];

const START_DATE = new Date(2026, 4, 18); // mese 0-indexed → 4 = maggio

function dateForIndex(i) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + i);
  return d;
}

function formatDateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function todayIndex() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const start = new Date(START_DATE);
  start.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / (1000*60*60*24));
  if (diff < 0) return 0;
  if (diff >= DAYS.length) return DAYS.length - 1;
  return diff;
}

// ---------- STATE ----------
const STORAGE_KEY = 'programma_v9_state';
let state = {
  currentDay: 0,
  theme: 'light',
  checks: {},      // { "day-0-meal-colazione": true, ... }
  exercises: {},   // { "day-0-ex-0": true, ... }
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.assign(state, parsed);
    }
  } catch (e) { console.warn('Cannot load state', e); }
  
  // Initial day = today if in range, else 0
  if (state.currentDay === undefined || state.currentDay === null) {
    state.currentDay = todayIndex();
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      currentDay: state.currentDay,
      theme: state.theme,
      checks: state.checks,
      exercises: state.exercises
    }));
  } catch (e) { console.warn('Cannot save state', e); }

// ---------- DAY TYPE LABEL ----------
function dayTypeLabel(type) {
  const labels = {
    office: 'Ufficio',
    home: 'Telelavoro',
    sport: 'Sport',
    running: 'Corsa',
    rest: 'Riposo'
  };
  return labels[type] || '';
}

function detectDayType(day) {
  if (day.type) return day.type;
  // Heuristic from title/subtitle if not set
  const t = (day.title + ' ' + (day.sottotitolo||'')).toLowerCase();
  if (t.includes('sportiva') || t.includes('sport:')) return 'sport';
  if (t.includes('corsa') || t.includes('cheat')) return 'running';
  if (t.includes('riposo') || t.includes('domenica')) return 'rest';
  if (t.includes('lavoro da casa')) return 'home';
  return 'office';
}

// ---------- RECIPE DETECTION IN TEXT ----------
function annotateRecipes(text) {
  let result = text;
  RICETTE.forEach(r => {
    const variants = [];
    // Add main name (case-insensitive)
    const re = new RegExp('\\b(' + r.nome.replace(/[.*+?^${}()|[\]\\]/g, '\\// APP_LOGIC_PLACEHOLDER') + ')\\b', 'i');
    if (re.test(result)) {
      result = result.replace(re, (m) => `<span class="recipe-link" data-recipe="${r.id}">${m}</span>`);
    }
  });
  // Add custom triggers for common foods
  const triggers = [
    { match: /porridge/i, id: 'porridge-proteico' },
    { match: /smoothie bowl/i, id: 'smoothie-bowl-mango' },
    { match: /pancake protei/i, id: 'pancake-proteici' },
    { match: /frittata/i, id: 'frittata-verdure' },
    { match: /buddha bowl/i, id: 'buddha-bowl-ufficio' },
    { match: /mug cake/i, id: 'mug-cake-proteica' },
    { match: /insalata di lenticchie/i, id: 'insalata-lenticchie' },
    { match: /vellutata di zucchine/i, id: 'vellutata-zucchine' }
  ];
  triggers.forEach(t => {
    if (result.includes('class="recipe-link"')) return; // already annotated
    if (t.match.test(result)) {
      result = result.replace(t.match, (m) => `<span class="recipe-link" data-recipe="${t.id}">${m}</span>`);
    }
  });
  return result;
}

function renderWorkoutCard(sec, idx, si) {
  let html = `<div class="workout-card">`;
  html += `<h3 class="workout-title">${sec.titolo || 'Allenamento'}</h3>`;
  if (sec.testo) html += `<div class="workout-meta">${sec.testo}</div>`;
  
  // Build exercise list
  const exercises = [];
  if (sec.tabella) {
    // Format: [["name","reps","note"], ...]
    sec.tabella.forEach(row => {
      exercises.push({ name: row[0], reps: row[1], note: row[2] });
    });
  } else if (sec.items) {
    sec.items.forEach(item => {
      // Try to split "Name N x R"
      const match = item.match(/^(.+?)\s+(\d+\s*x\s*[\d\s\-\/a-zA-Z]+)$/);
      if (match) {
        exercises.push({ name: match[1].trim(), reps: match[2].trim() });
      } else {
        exercises.push({ name: item, reps: '' });
      }
    });
  }
  
  html += `<ul class="exercise-list">`;
  exercises.forEach((ex, ei) => {
    const key = `d${idx}-ex${si}-${ei}`;
    const done = state.exercises[key] ? 'done' : '';
    html += `<li class="exercise-item ${done}" data-exercise="${key}">
      <div class="exercise-checkbox">${ICONS.check}</div>
      <div style="flex:1">
        <div class="exercise-name">${ex.name}</div>
        ${ex.note ? `<div class="exercise-note">${ex.note}</div>` : ''}
      </div>
      ${ex.reps ? `<div class="exercise-reps">${ex.reps}</div>` : ''}
    </li>`;
  });
  html += `</ul>`;
  
  // Detect if hiit / circuit → show timer button
  const t = (sec.titolo || '').toLowerCase();
  if (t.includes('hiit') || t.includes('circuito') || t.includes('full body') || (sec.testo && /\d+\s*sec.*\/\s*\d+\s*sec/.test(sec.testo))) {
    // Try to parse work/rest from testo
    let work = 40, rest = 20, rounds = 4;
    if (sec.testo) {
      const m1 = sec.testo.match(/(\d+)\s*sec.*?(\d+)\s*sec/i);
      if (m1) { work = parseInt(m1[1]); rest = parseInt(m1[2]); }
      const m2 = sec.testo.match(/(\d+)\s*giri/i);
      if (m2) rounds = parseInt(m2[1]);
    }
    html += `<button class="timer-btn" data-open-timer="${work}-${rest}-${rounds}-${exercises.length || 5}">
      ${ICONS.timer} Avvia timer (${work}s/${rest}s × ${rounds})
    </button>`;
  } else if (t.includes('corsa')) {
    // simple stopwatch for run
    html += `<button class="timer-btn" data-open-timer="stopwatch">
      ${ICONS.timer} Avvia cronometro
    </button>`;
  } else {
    // Generic timer for plank/abs
    html += `<button class="timer-btn" data-open-timer="30-15-3-${exercises.length || 4}">
      ${ICONS.timer} Avvia timer esercizi
    </button>`;
  }
  
  html += `</div>`;
  return html;
}

function formatDayTitle(title) {
  // Split "Lunedi 18 maggio - subtitle" into giorno + data + sottotitolo
  // Detect day name (Lunedi, Martedi, ...)
  const m = title.match(/^(Luned[i\u00ec]|Marted[i\u00ec]|Mercoled[i\u00ec]|Gioved[i\u00ec]|Venerd[i\u00ec]|Sabato|Domenica)\s+(.+?)(?:\s+-\s+.+)?$/);
  if (m) return `<em>${m[1]}</em><br>${m[2]}`;
  return title;
}

function getWeek(idx) {
  return Math.floor(idx / 7) + 1;
}

function computeDayProgress(idx) {
  const day = DAYS[idx];
  let total = 0, done = 0;
  // Meals
  day.pasti.forEach((p, pi) => {
    p.items.forEach((_, ii) => {
      total++;
      if (state.checks[`d${idx}-m${pi}-${ii}`]) done++;
    });
  });
  // Giornata
  day.giornata.forEach((_, gi) => {
    total++;
    if (state.checks[`d${idx}-g-${gi}`]) done++;
  });
  // Sport faccende items
  day.sportEFaccende.forEach((sec, si) => {
    if (sec.items) {
      sec.items.forEach((_, ii) => {
        total++;
        if (state.checks[`d${idx}-s${si}-${ii}`]) done++;
      });
    }
    if (sec.tabella) {
      sec.tabella.forEach((_, ei) => {
        total++;
        if (state.exercises[`d${idx}-ex${si}-${ei}`]) done++;
      });
    } else if (sec.items && (sec.titolo||'').toLowerCase().match(/sport|allenamento|corsa|addominali|hiit|full body/)) {
      // exercises counted again via state.exercises
      sec.items.forEach((_, ei) => {
        // Already counted above as items, skip
      });
    }
  });
  if (total === 0) return 0;
  return Math.round(done / total * 100);
}

function computeWeekProgress(week) {
  let total = 0, done = 0;
  DAYS.forEach((day, idx) => {
    if (getWeek(idx) !== week) return;
    day.pasti.forEach((p, pi) => p.items.forEach((_, ii) => {
      total++;
      if (state.checks[`d${idx}-m${pi}-${ii}`]) done++;
    }));
    day.giornata.forEach((_, gi) => {
      total++;
      if (state.checks[`d${idx}-g-${gi}`]) done++;
    });
    day.sportEFaccende.forEach((sec, si) => {
      if (sec.items) sec.items.forEach((_, ii) => {
        total++;
        if (state.checks[`d${idx}-s${si}-${ii}`]) done++;
      });
      if (sec.tabella) sec.tabella.forEach((_, ei) => {
        total++;
        if (state.exercises[`d${idx}-ex${si}-${ei}`]) done++;
      });
    });
  });
  if (total === 0) return 0;
  return Math.round(done / total * 100);
}

function computeTotalProgress() {
  let total = 0, done = 0;
  DAYS.forEach((day, idx) => {
    day.pasti.forEach((p, pi) => p.items.forEach((_, ii) => {
      total++;
      if (state.checks[`d${idx}-m${pi}-${ii}`]) done++;
    }));
    day.giornata.forEach((_, gi) => {
      total++;
      if (state.checks[`d${idx}-g-${gi}`]) done++;
    });
    day.sportEFaccende.forEach((sec, si) => {
      if (sec.items) sec.items.forEach((_, ii) => {
        total++;
        if (state.checks[`d${idx}-s${si}-${ii}`]) done++;
      });
      if (sec.tabella) sec.tabella.forEach((_, ei) => {
        total++;
        if (state.exercises[`d${idx}-ex${si}-${ei}`]) done++;
      });
    });
  });
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

function attachOggiHandlers() {
  document.querySelectorAll('[data-check]').forEach(el => {
    el.addEventListener('click', (e) => {
      // Skip if click on a recipe link
      if (e.target.closest('.recipe-link')) return;
      const k = el.dataset.check;
      state.checks[k] = !state.checks[k];
      el.classList.toggle('checked');
      saveState();
      updateProgress();
    });
  });
  document.querySelectorAll('[data-exercise]').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.exercise;
      state.exercises[k] = !state.exercises[k];
      el.classList.toggle('done');
      saveState();
      updateProgress();
    });
  });
  document.querySelectorAll('.recipe-link').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      openRecipe(el.dataset.recipe);
    });
  });
  document.querySelectorAll('[data-open-timer]').forEach(el => {
    el.addEventListener('click', () => openTimer(el.dataset.openTimer));
  });
  
  const prev = document.getElementById('prev-day');
  const next = document.getElementById('next-day');
  if (prev) prev.addEventListener('click', () => navigate(-1));
  if (next) next.addEventListener('click', () => navigate(1));
}

function navigate(delta) {
  const newIdx = state.currentDay + delta;
  if (newIdx < 0 || newIdx >= DAYS.length) return;
  state.currentDay = newIdx;
  saveState();
  renderOggi();
  try { window.scrollTo({top: 0, behavior: 'smooth'}); } catch(e) { try { window.scrollTo(0,0); } catch(e2){} }
}

function updateProgress() {
  const pct = computeDayProgress(state.currentDay);
  const pb = document.querySelector('.progress-fill');
  const txt = document.querySelector('.progress-percent');
  if (pb) pb.style.width = pct + '%';
  if (txt) txt.textContent = pct + '%';
}

// ---------- CALENDAR VIEW ----------
function renderCalendario() {
  const html = [];
  html.push(`
    <div class="calendar-header">
      <div class="calendar-subtitle">Programma di 24 giorni</div>
      <h1 class="calendar-title">Calendario</h1>
    </div>
    <div class="calendar-grid">
  `);
  
  // Day labels Lun-Dom (Italian style)
  ['L','M','M','G','V','S','D'].forEach(d => {
    html.push(`<div class="calendar-day-label">${d}</div>`);
  });
  
  // Pad to align with Monday start (18 mai 2026 = lundi → no padding needed)
  const startWeekday = (START_DATE.getDay() + 6) % 7; // 0=Mon...6=Sun
  for (let i = 0; i < startWeekday; i++) {
    html.push('<div class="calendar-cell empty"></div>');
  }
  
  const todayIdx = todayIndex();
  
  DAYS.forEach((day, idx) => {
    const d = dateForIndex(idx);
    const pct = computeDayProgress(idx);
    const classes = ['calendar-cell'];
    if (pct === 100) classes.push('completed');
    else if (pct > 0) classes.push('partial');
    if (idx === todayIdx) classes.push('today');
    if (d > new Date()) classes.push('future');
    
    html.push(`<div class="${classes.join(' ')}" data-day-idx="${idx}">
      <div class="calendar-cell-num">${d.getDate()}</div>
      <div class="calendar-cell-day">${DAYS_SHORT[d.getDay()]}</div>
    </div>`);
  });
  
  html.push(`</div>
    <div class="calendar-legend">
      <div class="legend-item"><div class="legend-square completed"></div>Completato</div>
      <div class="legend-item"><div class="legend-square partial"></div>In corso</div>
      <div class="legend-item"><div class="legend-square today"></div>Oggi</div>
    </div>
  `);
  
  document.getElementById('view-calendario').innerHTML = html.join('');
  
  document.querySelectorAll('#view-calendario [data-day-idx]').forEach(el => {
    el.addEventListener('click', () => {
      state.currentDay = parseInt(el.dataset.dayIdx);
      saveState();
      switchView('oggi');
      renderOggi();
    });
  });
}

// ---------- STATS VIEW ----------
function renderStatistiche() {
  const total = computeTotalProgress();
  const today = todayIndex();
  const todayPct = computeDayProgress(today);
  
  // Streak: consecutive completed days from start
  let completedDays = 0;
  for (let i = 0; i <= today; i++) {
    if (computeDayProgress(i) >= 80) completedDays++;
  }
  
  // Workouts done
  let workoutsDone = 0, workoutsTotal = 0;
  DAYS.forEach((day, idx) => {
    day.sportEFaccende.forEach((sec, si) => {
      const isWorkout = (sec.titolo||'').toLowerCase().match(/sport|allenamento|corsa|addominali|hiit|full body/);
      if (!isWorkout) return;
      const exCount = (sec.tabella ? sec.tabella.length : (sec.items ? sec.items.length : 0));
      if (exCount === 0) return;
      workoutsTotal++;
      let exDone = 0;
      for (let ei = 0; ei < exCount; ei++) {
        if (state.exercises[`d${idx}-ex${si}-${ei}`]) exDone++;
      }
      if (exDone === exCount) workoutsDone++;
    });
  });
  
  const html = `
    <div class="stats-header">
      <h1 class="stats-title">Statistiche</h1>
    </div>
    
    <div class="stat-card">
      <div class="stat-card-label">Progresso totale</div>
      <div class="stat-card-value">${total.pct}<em>%</em></div>
      <div class="stat-card-sub">${total.done} di ${total.total} elementi spuntati</div>
    </div>
    
    <div class="stat-card">
      <div class="stat-card-label">Oggi</div>
      <div class="stat-card-value">${todayPct}<em>%</em></div>
      <div class="stat-card-sub">${dateForIndex(today).getDate()} ${MONTHS_IT[dateForIndex(today).getMonth()]}</div>
    </div>
    
    <div class="stat-card">
      <div class="stat-card-label">Giorni completati</div>
      <div class="stat-card-value">${completedDays}<em>/24</em></div>
      <div class="stat-card-sub">Almeno 80% degli elementi spuntati</div>
    </div>
    
    <div class="stat-card">
      <div class="stat-card-label">Allenamenti completati</div>
      <div class="stat-card-value">${workoutsDone}<em>/${workoutsTotal}</em></div>
      <div class="stat-card-sub">Sessioni 100% complete</div>
    </div>
    
    <div class="stat-card">
      <div class="stat-card-label">Per settimana</div>
      <div class="stats-bars">
        ${[1,2,3,4].map(w => {
          const pct = computeWeekProgress(w);
          return `<div class="week-stat">
            <div class="week-stat-label">
              <span class="week-stat-name">Settimana ${w}</span>
              <span class="week-stat-pct">${pct}%</span>
            </div>
            <div class="week-stat-bar"><div class="week-stat-fill" style="width:${pct}%"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
  document.getElementById('view-statistiche').innerHTML = html;
}

// ---------- RICETTE VIEW ----------
function renderRicette() {
  const groups = {};
  RICETTE.forEach(r => {
    if (!groups[r.tag]) groups[r.tag] = [];
    groups[r.tag].push(r);
  });
  
  const groupNames = {
    'colazione': 'Colazione',
    'pranzo-rapido': 'Pranzo veloce',
    'pranzo-ufficio': 'Pranzo da portare in ufficio',
    'cena': 'Cena',
    'dessert': 'Dessert'
  };
  
  let html = `
    <div class="ricette-header">
      <div class="ricette-subtitle">Ricette del programma</div>
      <h1 class="ricette-title">Cucina</h1>
    </div>
  `;
  
  Object.keys(groups).forEach(tag => {
    html += `<h2 class="section-title" style="margin-top:24px;">${groupNames[tag] || tag}</h2>`;
    groups[tag].forEach(r => {
      html += `<div class="ricetta-item" data-ricetta="${r.id}">
        <div class="ricetta-info">
          <div class="ricetta-nome">${r.nome}</div>
          <div class="ricetta-meta">
            <span>${r.tempo}</span>
            <span>${r.porzioni} porzione${r.porzioni>1?'i':''}</span>
          </div>
        </div>
        <div class="ricetta-arrow">›</div>
      </div>`;
    });
  });
  
  document.getElementById('view-ricette').innerHTML = html;
  
  document.querySelectorAll('[data-ricetta]').forEach(el => {
    el.addEventListener('click', () => openRecipe(el.dataset.ricetta));
  });
}

// ---------- RECIPE MODAL ----------
function openRecipe(id) {
  const r = RICETTE.find(x => x.id === id);
  if (!r) return;
  const html = `
    <div class="modal-handle"></div>
    <button class="modal-close" id="modal-close-btn">${ICONS.close}</button>
    <div class="modal-header">
      <h2 class="modal-title"><em>${r.nome}</em></h2>
      <div class="modal-meta">
        <span>${r.tempo}</span>
        <span>${r.porzioni} porzione${r.porzioni>1?'i':''}</span>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-section-title">Ingredienti</div>
      <ul class="modal-list">
        ${r.ingredienti.map(i => `<li>${i}</li>`).join('')}
      </ul>
      <div class="modal-section-title">Preparazione</div>
      <ol class="modal-list numbered">
        ${r.preparazione.map(p => `<li>${p}</li>`).join('')}
      </ol>
      ${r.note ? `<div class="modal-note">${r.note}</div>` : ''}
    </div>
  `;
  showModal(html);
}

function showModal(content) {
  const backdrop = document.getElementById('modal-backdrop');
  const modal = document.getElementById('modal-content');
  modal.innerHTML = content;
  backdrop.classList.add('show');
  document.body.classList.add('no-scroll');
  setTimeout(() => {
    const closeBtn = document.getElementById('modal-close-btn');
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
  }, 0);
}

function closeModal() {
  const backdrop = document.getElementById('modal-backdrop');
  backdrop.classList.remove('show');
  document.body.classList.remove('no-scroll');
  stopTimer();
}

// ---------- TIMER ----------
let timerState = {
  work: 40, rest: 20, rounds: 4, exercises: 5,
  currentRound: 1, currentEx: 1,
  phase: 'work', // 'work' | 'rest' | 'done' | 'paused'
  remaining: 40,
  running: false,
  interval: null,
  mode: 'circuit' // 'circuit' | 'stopwatch'
};

function openTimer(spec) {
  if (spec === 'stopwatch') {
    openStopwatch();
    return;
  }
  // Format: "work-rest-rounds-exercises"
  const [w, r, ro, ex] = spec.split('-').map(n => parseInt(n));
  timerState.work = w || 40;
  timerState.rest = r || 20;
  timerState.rounds = ro || 4;
  timerState.exercises = ex || 5;
  timerState.currentRound = 1;
  timerState.currentEx = 1;
  timerState.phase = 'work';
  timerState.remaining = timerState.work;
  timerState.running = false;
  timerState.mode = 'circuit';
  renderTimer();
}

function renderTimer() {
  const ts = timerState;
  const phaseLabel = ts.phase === 'work' ? 'Lavoro' : (ts.phase === 'rest' ? 'Recupero' : (ts.phase === 'done' ? 'Completato' : 'In pausa'));
  const html = `
    <div class="modal-handle"></div>
    <button class="modal-close" id="modal-close-btn">${ICONS.close}</button>
    <div class="modal-header">
      <h2 class="modal-title">Timer <em>HIIT</em></h2>
      <div class="modal-meta">
        <span>Giro ${ts.currentRound}/${ts.rounds}</span>
        <span>Esercizio ${ts.currentEx}/${ts.exercises}</span>
      </div>
    </div>
    <div class="modal-body">
      <div class="timer-display">
        <div class="timer-phase ${ts.phase}">${phaseLabel}</div>
        <div class="timer-number">${String(ts.remaining).padStart(2,'0')}</div>
        <div class="timer-info">secondi</div>
      </div>
      
      <div class="timer-controls">
        <button class="timer-control-btn primary" id="timer-toggle">
          ${ts.running ? ICONS.pause + ' Pausa' : ICONS.play + ' ' + (ts.phase==='done'?'Riavvia':'Avvia')}
        </button>
        <button class="timer-control-btn" id="timer-reset">
          ${ICONS.reset} Reset
        </button>
      </div>
      
      <div class="timer-settings">
        <div class="timer-setting">
          <div class="timer-setting-label">Lavoro (s)</div>
          <div class="timer-setting-control">
            <button class="timer-pm-btn" data-adj="work-down">−</button>
            <span class="timer-setting-value" id="set-work">${ts.work}</span>
            <button class="timer-pm-btn" data-adj="work-up">+</button>
          </div>
        </div>
        <div class="timer-setting">
          <div class="timer-setting-label">Recupero (s)</div>
          <div class="timer-setting-control">
            <button class="timer-pm-btn" data-adj="rest-down">−</button>
            <span class="timer-setting-value" id="set-rest">${ts.rest}</span>
            <button class="timer-pm-btn" data-adj="rest-up">+</button>
          </div>
        </div>
        <div class="timer-setting">
          <div class="timer-setting-label">Giri</div>
          <div class="timer-setting-control">
            <button class="timer-pm-btn" data-adj="rounds-down">−</button>
            <span class="timer-setting-value" id="set-rounds">${ts.rounds}</span>
            <button class="timer-pm-btn" data-adj="rounds-up">+</button>
          </div>
        </div>
        <div class="timer-setting">
          <div class="timer-setting-label">Esercizi</div>
          <div class="timer-setting-control">
            <button class="timer-pm-btn" data-adj="ex-down">−</button>
            <span class="timer-setting-value" id="set-ex">${ts.exercises}</span>
            <button class="timer-pm-btn" data-adj="ex-up">+</button>
          </div>
        </div>
      </div>
    </div>
  `;
  showModal(html);
  
  // Bind controls
  document.getElementById('timer-toggle').addEventListener('click', toggleTimer);
  document.getElementById('timer-reset').addEventListener('click', resetTimer);
  document.querySelectorAll('[data-adj]').forEach(b => b.addEventListener('click', () => adjustTimer(b.dataset.adj)));
}

function adjustTimer(action) {
  if (timerState.running) return;
  const ts = timerState;
  const map = {
    'work-down': () => ts.work = Math.max(10, ts.work - 5),
    'work-up': () => ts.work += 5,
    'rest-down': () => ts.rest = Math.max(5, ts.rest - 5),
    'rest-up': () => ts.rest += 5,
    'rounds-down': () => ts.rounds = Math.max(1, ts.rounds - 1),
    'rounds-up': () => ts.rounds = Math.min(12, ts.rounds + 1),
    'ex-down': () => ts.exercises = Math.max(1, ts.exercises - 1),
    'ex-up': () => ts.exercises = Math.min(12, ts.exercises + 1)
  };
  if (map[action]) map[action]();
  ts.remaining = ts.work;
  ts.currentRound = 1;
  ts.currentEx = 1;
  ts.phase = 'work';
  renderTimer();
}

function toggleTimer() {
  const ts = timerState;
  if (ts.phase === 'done') {
    ts.currentRound = 1;
    ts.currentEx = 1;
    ts.phase = 'work';
    ts.remaining = ts.work;
  }
  ts.running = !ts.running;
  if (ts.running) {
    ts.interval = setInterval(tickTimer, 1000);
  } else {
    clearInterval(ts.interval);
  }
  renderTimer();
}

function resetTimer() {
  stopTimer();
  timerState.currentRound = 1;
  timerState.currentEx = 1;
  timerState.phase = 'work';
  timerState.remaining = timerState.work;
  renderTimer();
}

function stopTimer() {
  if (timerState.interval) clearInterval(timerState.interval);
  timerState.running = false;
  timerState.interval = null;
}

function tickTimer() {
  const ts = timerState;
  ts.remaining--;
  if (ts.remaining <= 0) {
    beep();
    // Phase transition
    if (ts.phase === 'work') {
      // Check if last exercise of last round
      if (ts.currentEx >= ts.exercises && ts.currentRound >= ts.rounds) {
        ts.phase = 'done';
        ts.remaining = 0;
        ts.running = false;
        clearInterval(ts.interval);
        bigBeep();
        renderTimer();
        return;
      }
      ts.phase = 'rest';
      ts.remaining = ts.rest;
    } else {
      // From rest → next exercise/round
      if (ts.currentEx >= ts.exercises) {
        ts.currentEx = 1;
        ts.currentRound++;
      } else {
        ts.currentEx++;
      }
      ts.phase = 'work';
      ts.remaining = ts.work;
    }
    renderTimer();
  } else {
    // Only update the number, not the whole modal
    const numEl = document.querySelector('.timer-number');
    if (numEl) numEl.textContent = String(ts.remaining).padStart(2,'0');
    // Beep on last 3 sec
    if (ts.remaining <= 3) beep(true);
  }
}

// Audio beeps using Web Audio API (no external files)
let audioCtx = null;
function beep(soft = false) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = soft ? 800 : 1100;
    g.gain.value = 0.12;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    o.stop(audioCtx.currentTime + 0.2);
    // Vibration
    if (navigator.vibrate) navigator.vibrate(soft ? 30 : 80);
  } catch(e) {}
}
function bigBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [880, 1100, 1320].forEach((freq, i) => {
      setTimeout(() => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.frequency.value = freq;
        g.gain.value = 0.15;
        o.connect(g); g.connect(audioCtx.destination);
        o.start();
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        o.stop(audioCtx.currentTime + 0.32);
      }, i*180);
    });
    if (navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
  } catch(e) {}
}

// ---------- STOPWATCH (for running) ----------
let swState = { running: false, elapsed: 0, interval: null };
function openStopwatch() {
  swState = { running: false, elapsed: 0, interval: null };
  renderStopwatch();
}
function formatSW(s) {
  const m = Math.floor(s/60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
function renderStopwatch() {
  const html = `
    <div class="modal-handle"></div>
    <button class="modal-close" id="modal-close-btn">${ICONS.close}</button>
    <div class="modal-header">
      <h2 class="modal-title"><em>Cronometro</em> corsa</h2>
      <div class="modal-meta"><span>Durata libera</span></div>
    </div>
    <div class="modal-body">
      <div class="timer-display">
        <div class="timer-phase">${swState.running ? 'In corso' : 'In pausa'}</div>
        <div class="timer-number">${formatSW(swState.elapsed)}</div>
        <div class="timer-info">minuti</div>
      </div>
      <div class="timer-controls">
        <button class="timer-control-btn primary" id="sw-toggle">
          ${swState.running ? ICONS.pause + ' Pausa' : ICONS.play + ' Avvia'}
        </button>
        <button class="timer-control-btn" id="sw-reset">
          ${ICONS.reset} Reset
        </button>
      </div>
    </div>
  `;
  showModal(html);
  document.getElementById('sw-toggle').addEventListener('click', () => {
    swState.running = !swState.running;
    if (swState.running) {
      swState.interval = setInterval(() => {
        swState.elapsed++;
        const el = document.querySelector('.timer-number');
        if (el) el.textContent = formatSW(swState.elapsed);
      }, 1000);
    } else {
      clearInterval(swState.interval);
    }
    renderStopwatch();
  });
  document.getElementById('sw-reset').addEventListener('click', () => {
    swState.running = false;
    if (swState.interval) clearInterval(swState.interval);
    swState.elapsed = 0;
    renderStopwatch();
  });
}

// ---------- VIEW SWITCHING ----------
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  
  // Render the view content if needed
  if (name === 'calendario') renderCalendario();
  if (name === 'statistiche') renderStatistiche();
  if (name === 'ricette') renderRicette();
  if (name === 'oggi') renderOggi();
  
  try { window.scrollTo(0, 0); } catch(e) {}
}

// ---------- THEME ----------
function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.querySelector('meta[name="theme-color"]').setAttribute('content', state.theme === 'dark' ? '#14110D' : '#F5F1E8');
  document.getElementById('theme-icon').innerHTML = state.theme === 'dark' ? ICONS.sun : ICONS.moon;
  saveState();
}

function buildShell() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <header class="app-header">
      <div>
        <div class="app-title">Programma <em>fitness</em></div>
        <div class="app-subtitle">18 mag – 10 giu 2026</div>
      </div>
      <button class="theme-toggle" id="theme-toggle"><span id="theme-icon">${ICONS.moon}</span></button>
    </header>
    
    <main>
      <div id="view-oggi" class="view active"></div>
      <div id="view-calendario" class="view"></div>
      <div id="view-statistiche" class="view"></div>
      <div id="view-ricette" class="view"></div>
    </main>
    
    <nav class="tab-bar">
      <button class="tab-btn active" data-view="oggi">${ICONS.home}<span>Oggi</span></button>
      <button class="tab-btn" data-view="calendario">${ICONS.calendar}<span>Calendario</span></button>
      <button class="tab-btn" data-view="statistiche">${ICONS.stats}<span>Stats</span></button>
      <button class="tab-btn" data-view="ricette">${ICONS.book}<span>Ricette</span></button>
    </nav>
    
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal" id="modal-content"></div>
    </div>
  `;
  
  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.addEventListener('click', () => switchView(b.dataset.view));
  });
  document.getElementById('modal-backdrop').addEventListener('click', (e) => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });
  
  // Apply theme
  if (state.theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#14110D');
    document.getElementById('theme-icon').innerHTML = ICONS.sun;
  }
}

// Init - aspetta che il DOM sia pronto e wrap tutto in try/catch
function bootApp() {
  try {
    loadState();
    buildShell();
    renderOggi();
  } catch (err) {
    // Display the error visibly so we can debug on iPhone
    const appEl = document.getElementById('app') || document.body;
    appEl.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#1A1611;background:#F5F1E8;min-height:100vh;">' +
      '<h2 style="margin:0 0 12px">Errore nell\'app</h2>' +
      '<p>Si è verificato un errore durante l\'avvio:</p>' +
      '<pre style="background:#fff;padding:12px;border-radius:8px;font-size:12px;overflow:auto;white-space:pre-wrap;">' +
      (err.message || err) + '\n\n' + (err.stack || '') +
      '</pre></div>';
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootApp);
} else {
  bootApp();
}
